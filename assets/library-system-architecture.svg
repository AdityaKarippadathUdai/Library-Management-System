<svg viewBox="0 0 1400 1080" xmlns="http://www.w3.org/2000/svg">

<style>

.title {
  fill: #ffffff;
  font-size: 38px;
  font-family: Arial;
  font-weight: bold;
  text-anchor: middle;
}

.subtitle {
  fill: #94a3b8;
  font-size: 17px;
  font-family: Arial;
  text-anchor: middle;
}

.box-title {
  fill: white;
  font-size: 24px;
  font-family: Arial;
  font-weight: bold;
  text-anchor: middle;
}

.box-text {
  fill: #cbd5e1;
  font-size: 14px;
  font-family: Arial;
  text-anchor: middle;
}

.small-label {
  fill: #94a3b8;
  font-size: 12px;
  font-family: Arial;
  text-anchor: middle;
}

.line {
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
}

.glow {
  filter: drop-shadow(0px 0px 10px rgba(168,85,247,0.45));
}

.packet {
  fill: #c084fc;
}

</style>

<!-- BACKGROUND -->

<rect width="1400" height="1080" fill="#0d1117"/>

<!-- GRID -->

<g opacity="0.06">

<line x1="0" y1="100" x2="1400" y2="100" stroke="white"/>
<line x1="0" y1="200" x2="1400" y2="200" stroke="white"/>
<line x1="0" y1="300" x2="1400" y2="300" stroke="white"/>
<line x1="0" y1="400" x2="1400" y2="400" stroke="white"/>
<line x1="0" y1="500" x2="1400" y2="500" stroke="white"/>
<line x1="0" y1="600" x2="1400" y2="600" stroke="white"/>
<line x1="0" y1="700" x2="1400" y2="700" stroke="white"/>
<line x1="0" y1="800" x2="1400" y2="800" stroke="white"/>
<line x1="0" y1="900" x2="1400" y2="900" stroke="white"/>

</g>

<!-- HEADER -->

<text x="700" y="70" class="title">
Library Management System Architecture
</text>

<text x="700" y="110" class="subtitle">
Flask • PostgreSQL • APScheduler • Authentication • Email Automation
</text>

<!-- MAIN FLOW -->

<line x1="700" y1="170" x2="700" y2="830"
stroke="#8b5cf6"
class="line glow"/>

<!-- MAIN PACKET -->

<circle r="10" class="packet">

<animateMotion
dur="4s"
repeatCount="indefinite"
path="M700 170 V830"/>

</circle>

<!-- USERS -->

<rect x="450" y="150"
width="500"
height="130"
rx="24"
fill="#1e1b4b"
stroke="#8b5cf6"
stroke-width="2"
class="glow">

<animate attributeName="opacity"
values="0.85;1;0.85"
dur="4s"
repeatCount="indefinite"/>

</rect>

<text x="700" y="210" class="box-title">
Users & Admin Portal
</text>

<text x="700" y="245" class="box-text">
Authentication • Borrow Requests • Dashboard Access
</text>

<!-- FRONTEND -->

<rect x="450" y="360"
width="500"
height="130"
rx="24"
fill="#312e81"
stroke="#a78bfa"
stroke-width="2"
class="glow">

<animate attributeName="opacity"
values="0.85;1;0.85"
dur="4.5s"
repeatCount="indefinite"/>

</rect>

<text x="700" y="420" class="box-title">
Frontend Interface
</text>

<text x="700" y="455" class="box-text">
Bootstrap 5 • jQuery • Responsive UI • Dark Mode
</text>

<!-- REQUEST LABEL -->

<text x="790" y="325" class="small-label">
HTTP Requests
</text>

<!-- BACKEND -->

<rect x="360" y="570"
width="680"
height="180"
rx="26"
fill="#172554"
stroke="#60a5fa"
stroke-width="2"
class="glow">

<animate attributeName="opacity"
values="0.85;1;0.85"
dur="5s"
repeatCount="indefinite"/>

</rect>

<text x="700" y="635" class="box-title">
Flask Backend Application
</text>

<text x="700" y="675" class="box-text">
Routes • Flask-Login • SQLAlchemy ORM • WTForms
</text>

<text x="700" y="705" class="box-text">
Authentication • Borrow Workflow • Session Management
</text>

<!-- LEFT AUTH CONNECTION -->

<line x1="500" y1="750" x2="250" y2="900"
stroke="#f43f5e"
class="line glow"/>

<!-- CENTER DB CONNECTION -->

<line x1="700" y1="750" x2="700" y2="880"
stroke="#22d3ee"
class="line glow"/>

<!-- RIGHT SCHEDULER CONNECTION -->

<line x1="900" y1="750" x2="1150" y2="900"
stroke="#84cc16"
class="line glow"/>

<!-- AUTH PACKET -->

<circle r="8" fill="#f43f5e">

<animateMotion
dur="2.5s"
repeatCount="indefinite"
path="M500 750 L250 900"/>

</circle>

<!-- DB PACKET -->

<circle r="8" fill="#22d3ee">

<animateMotion
dur="2.5s"
repeatCount="indefinite"
path="M700 750 V880"/>

</circle>

<!-- EMAIL PACKET -->

<circle r="8" fill="#84cc16">

<animateMotion
dur="2.5s"
repeatCount="indefinite"
path="M900 750 L1150 900"/>

</circle>

<!-- AUTH SERVICE -->

<rect x="80" y="850"
width="340"
height="150"
rx="24"
fill="#3b0764"
stroke="#f43f5e"
stroke-width="2"
class="glow">

<animate attributeName="opacity"
values="0.85;1;0.85"
dur="5s"
repeatCount="indefinite"/>

</rect>

<text x="250" y="915" class="box-title">
Authentication Service
</text>

<text x="250" y="950" class="box-text">
Flask-Login • Bcrypt
</text>

<text x="250" y="980" class="box-text">
Role-Based Access Control
</text>

<!-- DATABASE -->

<ellipse cx="700" cy="900"
rx="140"
ry="28"
fill="#0f766e"
stroke="#22d3ee"
stroke-width="2"/>

<rect x="560" y="900"
width="280"
height="110"
fill="#083344"
stroke="#22d3ee"
stroke-width="2"/>

<ellipse cx="700" cy="1010"
rx="140"
ry="28"
fill="#083344"
stroke="#22d3ee"
stroke-width="2"/>

<text x="700" y="945" class="box-title">
PostgreSQL Database
</text>

<text x="700" y="980" class="box-text">
Users • Books • BorrowedBook
</text>

<!-- SCHEDULER -->

<rect x="980" y="850"
width="340"
height="150"
rx="24"
fill="#3f6212"
stroke="#84cc16"
stroke-width="2"
class="glow">

<animate attributeName="opacity"
values="0.85;1;0.85"
dur="5.5s"
repeatCount="indefinite"/>

</rect>

<text x="1150" y="915" class="box-title">
Scheduler + Email Service
</text>

<text x="1150" y="950" class="box-text">
APScheduler • Flask-Mail
</text>

<text x="1150" y="980" class="box-text">
Automated Reminder Emails
</text>

</svg>
